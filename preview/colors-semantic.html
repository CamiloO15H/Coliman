<!doctype html>
<!-- @dsCard group="Colors" name="Semantic colors" subtitle="Success · Warning · Danger · Info" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { border: 1px solid var(--border); }
  .swatch { height: 80px; }
  .body { padding: 10px 12px 12px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: -0.005em; }
  .hex  { font-family: var(--font-display); font-weight: 500; font-size: 10px; letter-spacing: 0.12em; color: var(--fg-muted); text-transform: uppercase; margin-top: 2px; }
  .use  { font-size: 11px; color: var(--fg-secondary); margin-top: 6px; line-height: 1.35; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="grid">
    <div class="item"><div class="swatch" style="background:#4a7a4c"></div>
      <div class="body"><div class="name">Success</div><div class="hex">#4a7a4c</div><div class="use">Submittal approved, on-spec, on-time.</div></div>
    </div>
    <div class="item"><div class="swatch" style="background:#b88234"></div>
      <div class="body"><div class="name">Warning</div><div class="hex">#b88234</div><div class="use">Schedule risk, RFI open, hold required.</div></div>
    </div>
    <div class="item"><div class="swatch" style="background:#9b3a31"></div>
      <div class="body"><div class="name">Danger</div><div class="hex">#9b3a31</div><div class="use">Stop-work, safety, non-conformance.</div></div>
    </div>
    <div class="item"><div class="swatch" style="background:#5e6c83"></div>
      <div class="body"><div class="name">Info</div><div class="hex">#5e6c83</div><div class="use">Notes, neutral status, metadata.</div></div>
    </div>
  </div>
</div>
</body>
</html>

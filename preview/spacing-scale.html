<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4-pt base · s-1 → s-12" viewport="700x380" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .legend { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; color: var(--fg-muted); margin-bottom: 16px; }
  .row { display: grid; grid-template-columns: 70px 1fr 70px; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .tok { font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.04em; }
  .bar { height: 16px; background: var(--color-blue); }
  .px  { font-family: var(--font-display); font-weight: 500; font-size: 11px; letter-spacing: 0.08em; color: var(--fg-muted); text-align: right; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="legend">Spacing — 4-pt base</div>
  <div class="row"><div class="tok">s-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4 PX</div></div>
  <div class="row"><div class="tok">s-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8 PX</div></div>
  <div class="row"><div class="tok">s-3</div><div><div class="bar" style="width:12px"></div></div><div class="px">12 PX</div></div>
  <div class="row"><div class="tok">s-4</div><div><div class="bar" style="width:16px"></div></div><div class="px">16 PX</div></div>
  <div class="row"><div class="tok">s-5</div><div><div class="bar" style="width:24px"></div></div><div class="px">24 PX</div></div>
  <div class="row"><div class="tok">s-6</div><div><div class="bar" style="width:32px"></div></div><div class="px">32 PX</div></div>
  <div class="row"><div class="tok">s-7</div><div><div class="bar" style="width:40px"></div></div><div class="px">40 PX</div></div>
  <div class="row"><div class="tok">s-8</div><div><div class="bar" style="width:48px"></div></div><div class="px">48 PX</div></div>
  <div class="row"><div class="tok">s-9</div><div><div class="bar" style="width:64px"></div></div><div class="px">64 PX</div></div>
  <div class="row"><div class="tok">s-10</div><div><div class="bar" style="width:80px"></div></div><div class="px">80 PX</div></div>
  <div class="row"><div class="tok">s-11</div><div><div class="bar" style="width:96px"></div></div><div class="px">96 PX</div></div>
  <div class="row"><div class="tok">s-12</div><div><div class="bar" style="width:128px"></div></div><div class="px">128 PX</div></div>
</div>
</body>
</html>

<!doctype html>
<!-- @dsCard group="Colors" name="Neutral scale" subtitle="10-step neutral scale, Sand → Black" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutral scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .step { aspect-ratio: 1 / 1.2; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 8px; font-family: var(--font-display); }
  .step .n { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; }
  .step .h { font-size: 9px; letter-spacing: 0.08em; opacity: 0.7; }
  .legend { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; color: var(--fg-muted); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="legend">Neutrals — Sand → Black</div>
  <div class="scale">
    <div class="step" style="background:#f7f5f1;color:#212121"><span class="n">50</span><span class="h">f7f5f1</span></div>
    <div class="step" style="background:#efeae3;color:#212121"><span class="n">100</span><span class="h">efeae3</span></div>
    <div class="step" style="background:#e3dccf;color:#212121"><span class="n">200</span><span class="h">e3dccf</span></div>
    <div class="step" style="background:#d3c6b7;color:#212121"><span class="n">300</span><span class="h">d3c6b7</span></div>
    <div class="step" style="background:#a89c8e;color:#fff"><span class="n">400</span><span class="h">a89c8e</span></div>
    <div class="step" style="background:#7a7268;color:#fff"><span class="n">500</span><span class="h">7a7268</span></div>
    <div class="step" style="background:#524d46;color:#fff"><span class="n">600</span><span class="h">524d46</span></div>
    <div class="step" style="background:#3a3733;color:#fff"><span class="n">700</span><span class="h">3a3733</span></div>
    <div class="step" style="background:#2a2826;color:#fff"><span class="n">800</span><span class="h">2a2826</span></div>
    <div class="step" style="background:#212121;color:#fff"><span class="n">900</span><span class="h">212121</span></div>
  </div>
</div>
</body>
</html>
